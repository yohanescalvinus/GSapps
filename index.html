<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Green Screen Studio - Minimalist Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* CSS Variables - Minimalist Theme */
        :root {
            /* Dark Mode - Black Grey & White */
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --glass-bg: rgba(10, 10, 10, 0.75);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-tertiary: #808080;
            --accent-color: #ffffff;
            --accent-secondary: #e0e0e0;
            --card-bg: rgba(20, 20, 20, 0.6);
            --button-primary: #2a2a2a;
            --button-primary-hover: #3a3a3a;
            --button-secondary: #1f1f1f;
            --button-secondary-hover: #2f2f2f;
            --status-bg: rgba(0, 0, 0, 0.6);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --border-glow: 0 0 0 1px rgba(255, 255, 255, 0.1);
            --input-bg: rgba(30, 30, 30, 0.8);
            --slider-track: #2a2a2a;
            --slider-thumb: #ffffff;
        }

        body.light-mode {
            /* Light Mode - White Grey & Black */
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-tertiary: #6c6c6c;
            --accent-color: #1a1a1a;
            --accent-secondary: #2a2a2a;
            --card-bg: rgba(255, 255, 255, 0.7);
            --button-primary: #e5e5e5;
            --button-primary-hover: #d5d5d5;
            --button-secondary: #f0f0f0;
            --button-secondary-hover: #e0e0e0;
            --status-bg: rgba(255, 255, 255, 0.8);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --border-glow: 0 0 0 1px rgba(0, 0, 0, 0.05);
            --input-bg: rgba(240, 240, 240, 0.9);
            --slider-track: #e0e0e0;
            --slider-thumb: #1a1a1a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 16px;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        /* Glassmorphism with Minimalist Aura */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: var(--accent-secondary);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Minimalist Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--glass-border);
        }

        h1 {
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            letter-spacing: -0.5px;
        }

        .theme-toggle {
            display: flex;
            gap: 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 4px;
            border: 1px solid var(--glass-border);
        }

        .theme-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 36px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
            background: transparent;
            color: var(--text-primary);
        }

        .theme-btn.active {
            background: var(--accent-color);
            color: var(--bg-primary);
        }

        .resolution-badge {
            display: inline-block;
            background: var(--accent-color);
            color: var(--bg-primary);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Layout Utama - Support Portrait & Landscape */
        .main-layout {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        @media (orientation: portrait) {
            .main-layout {
                flex-direction: column;
            }
            .result-panel {
                width: 100%;
            }
            .source-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
        }

        @media (orientation: portrait) and (max-width: 480px) {
            .source-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }

        @media (orientation: landscape) and (min-width: 768px) {
            .main-layout {
                flex-direction: row;
            }
            .result-panel {
                flex: 1.5;
            }
            .source-grid {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
        }

        /* Panel Hasil - Minimalist Focus */
        .result-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid var(--glass-border);
        }

        .result-panel h2 {
            text-align: center;
            margin-bottom: 12px;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }

        .result-container {
            background: var(--bg-tertiary);
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            border: 1px solid var(--glass-border);
            width: 100%;
        }

        .result-container canvas {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            background: var(--bg-secondary);
        }

        /* Source Panels - Minimalist */
        .source-panel, .background-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid var(--glass-border);
        }

        .source-panel h3, .background-panel h3 {
            margin-bottom: 10px;
            font-size: clamp(0.8rem, 3vw, 0.95rem);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            letter-spacing: -0.2px;
        }

        .webcam-container, .bg-container {
            background: var(--bg-tertiary);
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 16/9;
            width: 100%;
            border: 1px solid var(--glass-border);
        }

        .webcam-container video, .bg-container canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Status Bar - Minimalist */
        .status-bar {
            background: var(--status-bg);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 10px 16px;
            text-align: center;
            font-size: 0.8rem;
            margin: 12px 0;
            border-left: 2px solid var(--accent-color);
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: -0.2px;
        }

        /* Kontrol Panel - Minimalist Glass */
        .controls-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 16px;
            margin-top: 12px;
            border: 1px solid var(--glass-border);
        }

        .control-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 12px;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            border-radius: 40px;
            font-size: clamp(0.75rem, 3vw, 0.85rem);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: var(--bg-primary);
            border-color: var(--accent-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .control-item {
            margin-bottom: 18px;
        }

        .control-item label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: -0.2px;
        }

        .control-item input[type="range"] {
            width: 100%;
            height: 3px;
            border-radius: 3px;
            background: var(--slider-track);
            -webkit-appearance: none;
        }

        .control-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--slider-thumb);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: var(--shadow);
        }

        .control-item input[type="color"] {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
        }

        .control-item select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            font-size: 0.85rem;
            font-weight: 400;
        }

        .value-display {
            float: right;
            color: var(--text-tertiary);
            font-weight: 400;
            font-size: 0.8rem;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .reset-default-btn {
            background: var(--button-secondary);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .reset-default-btn:hover {
            background: var(--button-secondary-hover);
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--button-primary);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        button:hover {
            background: var(--button-primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-capture {
            background: var(--accent-color);
            color: var(--bg-primary);
            border: none;
        }

        .btn-capture:hover {
            opacity: 0.9;
        }

        .btn-reset {
            background: var(--button-secondary);
            color: var(--text-primary);
        }

        .info-text {
            color: var(--text-tertiary);
            font-size: 0.7rem;
            margin-top: 6px;
            font-weight: 400;
        }

        .orientation-guide {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.65rem;
            z-index: 1000;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid var(--glass-border);
            color: var(--text-tertiary);
        }

        @media (orientation: portrait) {
            .orientation-guide {
                display: flex;
                align-items: center;
                gap: 6px;
            }
        }

        /* Minimalist Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-tertiary);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Minimalist Header -->
        <div class="header">
            <h1>
                green screen studio
                <span class="resolution-badge">2K</span>
            </h1>
            <div class="theme-toggle">
                <button class="theme-btn active" onclick="setTheme('dark')">dark</button>
                <button class="theme-btn" onclick="setTheme('light')">light</button>
            </div>
        </div>

        <!-- Layout Utama -->
        <div class="main-layout">
            <!-- Panel Hasil Utama -->
            <div class="result-panel glass-card">
                <h2>
                    result
                    <span class="resolution-badge">2K</span>
                </h2>
                <div class="result-container">
                    <canvas id="resultCanvas" width="2560" height="1440"></canvas>
                </div>
            </div>
            
            <!-- Grid Sumber -->
            <div class="source-grid">
                <div class="source-panel glass-card">
                    <h3>webcam input</h3>
                    <div class="webcam-container">
                        <video id="webcam" autoplay playsinline muted></video>
                    </div>
                </div>
                
                <div class="background-panel glass-card">
                    <h3>background</h3>
                    <div class="bg-container">
                        <canvas id="backgroundCanvas" width="2560" height="1440"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar" id="status">
            ● system ready
        </div>

        <!-- Kontrol Panel -->
        <div class="controls-panel glass-card">
            <div class="control-tabs">
                <button class="tab-btn active" onclick="switchTab('basic')">basic</button>
                <button class="tab-btn" onclick="switchTab('advanced')">advanced</button>
                <button class="tab-btn" onclick="switchTab('background')">background</button>
            </div>

            <!-- Tab Basic -->
            <div id="tab-basic" class="tab-content active">
                <div class="control-item">
                    <label>key color</label>
                    <input type="color" id="keyColor" value="#00ff00">
                </div>
                
                <div class="control-item">
                    <label>tolerance <span class="value-display" id="toleranceValue">0.35</span></label>
                    <input type="range" id="tolerance" min="0" max="0.8" step="0.01" value="0.35">
                </div>
                
                <div class="control-item">
                    <label>smooth edge <span class="value-display" id="smoothValue">0.15</span></label>
                    <input type="range" id="smoothness" min="0" max="0.3" step="0.01" value="0.15">
                </div>
                
                <div class="button-group">
                    <button class="reset-default-btn" onclick="resetBasicDefaults()">reset default</button>
                </div>
                <div class="info-text">default: green | tolerance 0.35 | smooth 0.15</div>
            </div>

            <!-- Tab Advanced -->
            <div id="tab-advanced" class="tab-content">
                <div class="control-item">
                    <label>quality</label>
                    <select id="qualityMode">
                        <option value="high">high (2K)</option>
                        <option value="medium" selected>medium (HD)</option>
                        <option value="low">low (fast)</option>
                    </select>
                </div>
                
                <div class="control-item">
                    <label>frame rate</label>
                    <select id="fpsLimit">
                        <option value="30">30 fps</option>
                        <option value="15" selected>15 fps (balance)</option>
                        <option value="10">10 fps</option>
                    </select>
                </div>
                
                <div class="control-item">
                    <label>camera</label>
                    <select id="cameraMode">
                        <option value="user" selected>front</option>
                        <option value="environment">back</option>
                    </select>
                </div>
                
                <div class="control-item">
                    <label>flip</label>
                    <select id="flipMode">
                        <option value="flip" selected>mirror</option>
                        <option value="normal">normal</option>
                    </select>
                </div>
                
                <div class="button-group">
                    <button class="reset-default-btn" onclick="resetAdvancedDefaults()">reset default</button>
                </div>
                <div class="info-text">default: medium | 15 fps | front | mirror</div>
            </div>

            <!-- Tab Background -->
            <div id="tab-background" class="tab-content">
                <div class="control-item">
                    <label>upload image</label>
                    <input type="file" id="bgUpload" accept="image/*">
                </div>
                
                <div class="button-group">
                    <button class="btn-reset" onclick="resetBackground()">reset</button>
                    <button class="btn-capture" onclick="captureResult()">capture</button>
                </div>
            </div>
        </div>

        <!-- Orientation Guide -->
        <div class="orientation-guide">
            <span>↻</span> landscape recommended
        </div>
    </div>

    <script>
        // ==================== THEME MANAGEMENT ====================
        function setTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.remove('light-mode');
                document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector('.theme-btn:first-child').classList.add('active');
            } else {
                document.body.classList.add('light-mode');
                document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector('.theme-btn:last-child').classList.add('active');
            }
            localStorage.setItem('theme', theme);
            updateStatus(`theme: ${theme} mode`);
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            setTheme('light');
        }

        // ==================== RESET DEFAULT FUNCTIONS ====================
        function resetBasicDefaults() {
            document.getElementById('keyColor').value = '#00ff00';
            keyColor = [0, 255, 0];
            
            document.getElementById('tolerance').value = '0.35';
            tolerance = 0.35;
            document.getElementById('toleranceValue').textContent = '0.35';
            
            document.getElementById('smoothness').value = '0.15';
            smoothness = 0.15;
            document.getElementById('smoothValue').textContent = '0.15';
            
            updateStatus("basic settings reset to default");
            
            const btn = event.target;
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => btn.style.transform = 'scale(1)', 200);
        }
        
        function resetAdvancedDefaults() {
            document.getElementById('qualityMode').value = 'medium';
            PROCESS_WIDTH = 1280;
            PROCESS_HEIGHT = 720;
            
            document.getElementById('fpsLimit').value = '15';
            fpsInterval = 1000 / 15;
            
            const oldCameraMode = document.getElementById('cameraMode').value;
            document.getElementById('cameraMode').value = 'user';
            
            document.getElementById('flipMode').value = 'flip';
            flipHorizontal = true;
            
            updateStatus("advanced settings reset to default");
            
            if (oldCameraMode !== 'user') {
                if (webcam.srcObject) {
                    webcam.srcObject.getTracks().forEach(track => track.stop());
                }
                isWebcamReady = false;
                initWebcam();
            }
            
            const btn = event.target;
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => btn.style.transform = 'scale(1)', 200);
        }
        
        // ==================== DETEKSI MOBILE ====================
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        
        // ==================== KONFIGURASI ====================
        const WIDTH = 2560;
        const HEIGHT = 1440;
        
        let PROCESS_WIDTH = 1280;
        let PROCESS_HEIGHT = 720;
        
        // ==================== INISIALISASI ====================
        const webcam = document.getElementById('webcam');
        const bgCanvas = document.getElementById('backgroundCanvas');
        const resultCanvas = document.getElementById('resultCanvas');
        
        const bgCtx = bgCanvas.getContext('2d');
        const resultCtx = resultCanvas.getContext('2d');
        
        bgCanvas.width = WIDTH;
        bgCanvas.height = HEIGHT;
        resultCanvas.width = WIDTH;
        resultCanvas.height = HEIGHT;
        
        // ==================== VARIABEL ====================
        let keyColor = [0, 255, 0];
        let tolerance = 0.35;
        let smoothness = 0.15;
        let backgroundImage = null;
        let isWebcamReady = false;
        let animationFrame = null;
        let lastProcessTime = 0;
        let fpsInterval = 1000 / 15;
        let flipHorizontal = true;
        
        // ==================== FUNGSI ====================
        function updateStatus(message) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = `● ${message}`;
        }
        
        function switchTab(tabName, event) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            if (event && event.target) {
                event.target.classList.add('active');
            } else {
                const btns = document.querySelectorAll('.tab-btn');
                if (tabName === 'basic') btns[0].classList.add('active');
                else if (tabName === 'advanced') btns[1].classList.add('active');
                else btns[2].classList.add('active');
            }
            
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }
        
        // ==================== INISIALISASI WEBCAM ====================
        async function initWebcam() {
            try {
                updateStatus("initializing camera...");
                
                const cameraMode = document.getElementById('cameraMode').value;
                const flipMode = document.getElementById('flipMode').value;
                flipHorizontal = flipMode === 'flip';
                
                const constraints = {
                    video: {
                        facingMode: cameraMode,
                        width: { ideal: isMobile ? 1280 : 1920 },
                        height: { ideal: isMobile ? 720 : 1080 },
                        frameRate: { ideal: 30 }
                    }
                };
                
                if (isIOS) {
                    constraints.video.width.ideal = 1280;
                    constraints.video.height.ideal = 720;
                }
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                webcam.srcObject = stream;
                
                webcam.onloadedmetadata = () => {
                    webcam.play()
                        .then(() => {
                            isWebcamReady = true;
                            updateStatus("camera ready");
                        })
                        .catch(e => updateStatus("error: " + e.message));
                };
                
            } catch (err) {
                updateStatus("camera access failed");
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    webcam.srcObject = stream;
                    updateStatus("compatibility mode");
                    isWebcamReady = true;
                } catch (e) {
                    updateStatus("cannot access camera");
                }
            }
        }
        
        // ==================== RESET BACKGROUND ====================
        function resetBackground() {
            // Minimalist gradient background
            const gradient = bgCtx.createLinearGradient(0, 0, WIDTH, HEIGHT);
            gradient.addColorStop(0, '#2a2a2a');
            gradient.addColorStop(0.5, '#1a1a1a');
            gradient.addColorStop(1, '#0a0a0a');
            
            bgCtx.fillStyle = gradient;
            bgCtx.fillRect(0, 0, WIDTH, HEIGHT);
            
            bgCtx.fillStyle = '#ffffff';
            bgCtx.font = '300 36px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
            bgCtx.textAlign = 'center';
            bgCtx.fillText('minimalist background', WIDTH/2, HEIGHT/2);
            bgCtx.font = '300 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
            bgCtx.fillStyle = '#808080';
            bgCtx.fillText('upload custom image', WIDTH/2, HEIGHT/2 + 60);
            
            backgroundImage = null;
            updateStatus("background reset");
        }
        
        // ==================== EVENT LISTENERS ====================
        document.getElementById('keyColor').addEventListener('input', (e) => {
            const hex = e.target.value;
            keyColor = [
                parseInt(hex.substr(1,2), 16),
                parseInt(hex.substr(3,2), 16),
                parseInt(hex.substr(5,2), 16)
            ];
        });
        
        document.getElementById('tolerance').addEventListener('input', (e) => {
            tolerance = parseFloat(e.target.value);
            document.getElementById('toleranceValue').textContent = tolerance.toFixed(2);
        });
        
        document.getElementById('smoothness').addEventListener('input', (e) => {
            smoothness = parseFloat(e.target.value);
            document.getElementById('smoothValue').textContent = smoothness.toFixed(2);
        });
        
        document.getElementById('qualityMode').addEventListener('change', (e) => {
            const quality = e.target.value;
            if (quality === 'high') {
                PROCESS_WIDTH = 1920;
                PROCESS_HEIGHT = 1080;
            } else if (quality === 'medium') {
                PROCESS_WIDTH = 1280;
                PROCESS_HEIGHT = 720;
            } else {
                PROCESS_WIDTH = 640;
                PROCESS_HEIGHT = 360;
            }
        });
        
        document.getElementById('fpsLimit').addEventListener('change', (e) => {
            const fps = parseInt(e.target.value);
            fpsInterval = 1000 / fps;
        });
        
        document.getElementById('cameraMode').addEventListener('change', () => {
            if (webcam.srcObject) {
                webcam.srcObject.getTracks().forEach(track => track.stop());
            }
            isWebcamReady = false;
            initWebcam();
        });
        
        document.getElementById('flipMode').addEventListener('change', (e) => {
            flipHorizontal = e.target.value === 'flip';
        });
        
        document.getElementById('bgUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        bgCtx.drawImage(img, 0, 0, WIDTH, HEIGHT);
                        backgroundImage = img;
                        updateStatus("background uploaded");
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        
        // ==================== GREEN SCREEN PROCESSING ====================
        function applyGreenScreen() {
            if (!isWebcamReady || webcam.readyState < 2) return false;
            
            try {
                const now = performance.now();
                if (now - lastProcessTime < fpsInterval) return true;
                lastProcessTime = now;
                
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = PROCESS_WIDTH;
                tempCanvas.height = PROCESS_HEIGHT;
                const tempCtx = tempCanvas.getContext('2d');
                
                if (flipHorizontal) {
                    tempCtx.save();
                    tempCtx.scale(-1, 1);
                    tempCtx.drawImage(webcam, -PROCESS_WIDTH, 0, PROCESS_WIDTH, PROCESS_HEIGHT);
                    tempCtx.restore();
                } else {
                    tempCtx.drawImage(webcam, 0, 0, PROCESS_WIDTH, PROCESS_HEIGHT);
                }
                
                const webcamData = tempCtx.getImageData(0, 0, PROCESS_WIDTH, PROCESS_HEIGHT);
                
                const bgTempCanvas = document.createElement('canvas');
                bgTempCanvas.width = PROCESS_WIDTH;
                bgTempCanvas.height = PROCESS_HEIGHT;
                const bgTempCtx = bgTempCanvas.getContext('2d');
                bgTempCtx.drawImage(bgCanvas, 0, 0, PROCESS_WIDTH, PROCESS_HEIGHT);
                const bgData = bgTempCtx.getImageData(0, 0, PROCESS_WIDTH, PROCESS_HEIGHT);
                
                const resultTempData = tempCtx.createImageData(PROCESS_WIDTH, PROCESS_HEIGHT);
                
                const webcamPixels = webcamData.data;
                const bgPixels = bgData.data;
                const resultPixels = resultTempData.data;
                
                for (let i = 0; i < webcamPixels.length; i += 4) {
                    const r = webcamPixels[i];
                    const g = webcamPixels[i + 1];
                    const b = webcamPixels[i + 2];
                    
                    const dr = r - keyColor[0];
                    const dg = g - keyColor[1];
                    const db = b - keyColor[2];
                    
                    const distance = Math.sqrt(dr*dr + dg*dg + db*db) / Math.sqrt(255*255*3);
                    
                    let alpha;
                    if (distance <= tolerance) {
                        alpha = 0;
                    } else if (distance >= tolerance + smoothness) {
                        alpha = 1;
                    } else {
                        alpha = (distance - tolerance) / smoothness;
                    }
                    
                    if (alpha === 0) {
                        resultPixels[i] = bgPixels[i];
                        resultPixels[i + 1] = bgPixels[i + 1];
                        resultPixels[i + 2] = bgPixels[i + 2];
                    } else if (alpha === 1) {
                        resultPixels[i] = webcamPixels[i];
                        resultPixels[i + 1] = webcamPixels[i + 1];
                        resultPixels[i + 2] = webcamPixels[i + 2];
                    } else {
                        resultPixels[i] = webcamPixels[i] * alpha + bgPixels[i] * (1 - alpha);
                        resultPixels[i + 1] = webcamPixels[i + 1] * alpha + bgPixels[i + 1] * (1 - alpha);
                        resultPixels[i + 2] = webcamPixels[i + 2] * alpha + bgPixels[i + 2] * (1 - alpha);
                    }
                    
                    resultPixels[i + 3] = 255;
                }
                
                const resultTempCanvas = document.createElement('canvas');
                resultTempCanvas.width = PROCESS_WIDTH;
                resultTempCanvas.height = PROCESS_HEIGHT;
                resultTempCanvas.getContext('2d').putImageData(resultTempData, 0, 0);
                
                resultCtx.drawImage(resultTempCanvas, 0, 0, WIDTH, HEIGHT);
                
                return true;
                
            } catch (error) {
                return false;
            }
        }
        
        // ==================== LOOP ====================
        function processFrame() {
            if (isWebcamReady) {
                applyGreenScreen();
            }
            animationFrame = requestAnimationFrame(processFrame);
        }
        
        // ==================== CAPTURE ====================
        window.captureResult = function() {
            try {
                const link = document.createElement('a');
                link.download = `greenscreen-${Date.now()}.png`;
                
                resultCanvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                    updateStatus("captured");
                    
                    if (isMobile) {
                        setTimeout(() => {
                            alert('image saved');
                        }, 100);
                    }
                }, 'image/png', 0.95);
                
            } catch (error) {
                updateStatus("capture failed");
            }
        };
        
        // ==================== EXPOSE FUNCTIONS ====================
        window.resetBackground = resetBackground;
        window.switchTab = switchTab;
        window.setTheme = setTheme;
        window.resetBasicDefaults = resetBasicDefaults;
        window.resetAdvancedDefaults = resetAdvancedDefaults;
        
        // ==================== START ====================
        resetBackground();
        initWebcam();
        processFrame();
        
        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
            if (webcam.srcObject) {
                webcam.srcObject.getTracks().forEach(track => track.stop());
            }
        });
        
        // Handle orientation change
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
            }, 100);
        });
    </script>
</body>
</html>
