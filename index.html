<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Green Screen Studio - Button Controls</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* CSS Variables - Minimalist Theme */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --glass-bg: rgba(10, 10, 10, 0.85);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-tertiary: #6c6c6c;
            --accent-color: #4a9eff;
            --accent-secondary: #4a9eff;
            --button-primary: #2a2a2a;
            --button-secondary: #1f1f1f;
            --status-bg: rgba(0, 0, 0, 0.6);
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            --input-bg: rgba(30, 30, 30, 0.9);
            --slider-track: #2a2a2a;
            --slider-thumb: #ffffff;
        }

        body.light-mode {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-tertiary: #8a8a8a;
            --accent-color: #0066ff;
            --accent-secondary: #0066ff;
            --button-primary: #e8e8e8;
            --button-secondary: #f5f5f5;
            --status-bg: rgba(255, 255, 255, 0.85);
            --slider-track: #e0e0e0;
            --slider-thumb: #1a1a1a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 16px;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--glass-border);
        }

        h1 {
            font-size: clamp(1rem, 4vw, 1.4rem);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Button Style - Bukan Toggle Geser */
        .mode-buttons {
            display: flex;
            gap: 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 4px;
            border: 1px solid var(--glass-border);
        }

        .mode-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: var(--text-secondary);
        }

        .mode-btn.active {
            background: var(--accent-secondary);
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .resolution-badge {
            display: inline-block;
            background: var(--accent-secondary);
            color: #ffffff;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 500;
        }

        /* Layout Utama */
        .main-layout {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        /* Panel Hasil */
        .result-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid var(--glass-border);
            flex: 1.5;
            min-width: 0;
        }

        .result-panel h2 {
            text-align: center;
            margin-bottom: 12px;
            font-size: clamp(0.85rem, 3vw, 1rem);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .result-container {
            position: relative;
            width: 100%;
            background: var(--bg-tertiary);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: aspect-ratio 0.3s ease;
        }

        .result-container.landscape-mode {
            aspect-ratio: 16 / 9;
        }

        .result-container.portrait-mode {
            aspect-ratio: 9 / 16;
        }

        .result-container canvas {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: block;
            object-fit: contain;
            background: var(--bg-secondary);
        }

        /* Grid Sumber */
        .source-grid {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
        }

        .source-panel, .background-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid var(--glass-border);
        }

        .source-panel h3, .background-panel h3 {
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-secondary);
        }

        .webcam-container, .bg-container {
            position: relative;
            width: 100%;
            background: var(--bg-tertiary);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: aspect-ratio 0.3s ease;
        }

        .webcam-container.landscape-mode, .bg-container.landscape-mode {
            aspect-ratio: 16 / 9;
        }

        .webcam-container.portrait-mode, .bg-container.portrait-mode {
            aspect-ratio: 9 / 16;
        }

        .webcam-container video, .bg-container canvas {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: block;
            object-fit: contain;
            background: var(--bg-secondary);
        }

        .status-bar {
            background: var(--status-bg);
            backdrop-filter: blur(12px);
            border-radius: 10px;
            padding: 8px 12px;
            text-align: center;
            font-size: 0.7rem;
            margin: 12px 0;
            border-left: 2px solid var(--accent-secondary);
            color: var(--text-secondary);
        }

        .controls-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 16px;
            margin-top: 8px;
            border: 1px solid var(--glass-border);
        }

        .control-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 8px;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .tab-btn.active {
            background: var(--accent-secondary);
            color: #ffffff;
            border-color: var(--accent-secondary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .control-item {
            margin-bottom: 16px;
        }

        .control-item label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.8rem;
        }

        .control-item input[type="range"] {
            width: 100%;
            height: 3px;
            border-radius: 3px;
            background: var(--slider-track);
            -webkit-appearance: none;
        }

        .control-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--slider-thumb);
            border-radius: 50%;
            cursor: pointer;
        }

        .control-item input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
        }

        .control-item select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            font-size: 0.8rem;
        }

        .value-display {
            float: right;
            color: var(--text-tertiary);
            font-size: 0.75rem;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--button-primary);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-capture {
            background: var(--accent-secondary);
            color: #ffffff;
            border: none;
        }

        .info-text {
            color: var(--text-tertiary);
            font-size: 0.65rem;
            margin-top: 6px;
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .main-layout {
                flex-direction: column;
            }
            .source-grid {
                flex-direction: row;
            }
            .source-panel, .background-panel {
                flex: 1;
            }
            .mode-btn {
                padding: 6px 14px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 480px) {
            .source-grid {
                flex-direction: column;
            }
            .header-controls {
                width: 100%;
                justify-content: space-between;
            }
            .mode-btn {
                padding: 5px 10px;
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>green screen <span class="resolution-badge">studio</span></h1>
            <div class="header-controls">
                <!-- Button Group untuk Orientasi -->
                <div class="mode-buttons">
                    <button class="mode-btn active" id="landscapeBtn" onclick="setOrientation('landscape')">🌄 landscape</button>
                    <button class="mode-btn" id="portraitBtn" onclick="setOrientation('portrait')">📱 portrait</button>
                </div>
                <!-- Button Group untuk Tema -->
                <div class="mode-buttons">
                    <button class="mode-btn active" id="darkBtn" onclick="setTheme('dark')">🌙 dark</button>
                    <button class="mode-btn" id="lightBtn" onclick="setTheme('light')">☀️ light</button>
                </div>
            </div>
        </div>

        <div class="main-layout">
            <div class="result-panel glass-card">
                <h2>result <span class="resolution-badge" id="orientationBadge">16:9</span></h2>
                <div class="result-container landscape-mode" id="resultContainer">
                    <canvas id="resultCanvas"></canvas>
                </div>
                <div class="info-text">hasil green screen | capture dalam resolusi asli</div>
            </div>
            
            <div class="source-grid">
                <div class="source-panel glass-card">
                    <h3>webcam input</h3>
                    <div class="webcam-container landscape-mode" id="webcamContainer">
                        <video id="webcam" autoplay playsinline muted></video>
                    </div>
                    <div class="info-text" id="webcamInfo">menunggu webcam...</div>
                </div>
                
                <div class="background-panel glass-card">
                    <h3>background</h3>
                    <div class="bg-container landscape-mode" id="bgContainer">
                        <canvas id="backgroundCanvas"></canvas>
                    </div>
                    <div class="info-text">upload & adjust background</div>
                </div>
            </div>
        </div>

        <div class="status-bar" id="status">● system ready | dark | landscape</div>

        <div class="controls-panel glass-card">
            <div class="control-tabs">
                <button class="tab-btn active" onclick="switchTab('basic')">basic</button>
                <button class="tab-btn" onclick="switchTab('advanced')">advanced</button>
                <button class="tab-btn" onclick="switchTab('background')">bg adjust</button>
            </div>

            <div id="tab-basic" class="tab-content active">
                <div class="control-item">
                    <label>key color</label>
                    <input type="color" id="keyColor" value="#00ff00">
                </div>
                <div class="control-item">
                    <label>tolerance <span class="value-display" id="toleranceValue">0.35</span></label>
                    <input type="range" id="tolerance" min="0" max="0.8" step="0.01" value="0.35">
                </div>
                <div class="control-item">
                    <label>smooth edge <span class="value-display" id="smoothValue">0.15</span></label>
                    <input type="range" id="smoothness" min="0" max="0.3" step="0.01" value="0.15">
                </div>
                <div class="button-group">
                    <button onclick="resetBasicDefaults()">reset default</button>
                </div>
            </div>

            <div id="tab-advanced" class="tab-content">
                <div class="control-item">
                    <label>quality (processing)</label>
                    <select id="qualityMode">
                        <option value="high">high</option>
                        <option value="medium" selected>medium</option>
                        <option value="low">low</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>frame rate</label>
                    <select id="fpsLimit">
                        <option value="30">30 fps</option>
                        <option value="15" selected>15 fps</option>
                        <option value="10">10 fps</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>camera</label>
                    <select id="cameraMode">
                        <option value="user" selected>front</option>
                        <option value="environment">back</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>flip</label>
                    <select id="flipMode">
                        <option value="flip" selected>mirror</option>
                        <option value="normal">normal</option>
                    </select>
                </div>
                <div class="button-group">
                    <button onclick="resetAdvancedDefaults()">reset default</button>
                </div>
            </div>

            <div id="tab-background" class="tab-content">
                <div class="control-item">
                    <label>📁 upload image</label>
                    <input type="file" id="bgUpload" accept="image/*">
                </div>
                <div class="control-item">
                    <label>🔍 zoom <span class="value-display" id="zoomValue">100%</span></label>
                    <input type="range" id="bgZoom" min="50" max="200" step="5" value="100">
                </div>
                <div class="control-item">
                    <label>↔️ position X <span class="value-display" id="posXValue">0</span></label>
                    <input type="range" id="bgPosX" min="-100" max="100" step="2" value="0">
                </div>
                <div class="control-item">
                    <label>↕️ position Y <span class="value-display" id="posYValue">0</span></label>
                    <input type="range" id="bgPosY" min="-100" max="100" step="2" value="0">
                </div>
                <div class="control-item">
                    <label>🔄 rotation <span class="value-display" id="rotateValue">0°</span></label>
                    <input type="range" id="bgRotate" min="0" max="360" step="5" value="0">
                </div>
                <div class="button-group">
                    <button onclick="resetBackgroundTransform()">reset transform</button>
                    <button class="btn-capture" onclick="captureResult()">capture</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== THEME STATE ====================
        let currentTheme = 'dark';
        
        // ==================== ORIENTATION STATE ====================
        let currentOrientation = 'landscape';
        
        // ==================== VARIABLES ====================
        let videoWidth = 0, videoHeight = 0;
        let bgImageObj = null;
        let bgZoom = 100, bgPosX = 0, bgPosY = 0, bgRotate = 0;
        
        let keyColor = [0, 255, 0];
        let tolerance = 0.35;
        let smoothness = 0.15;
        let isWebcamReady = false;
        let animationFrame = null;
        let lastProcessTime = 0;
        let fpsInterval = 1000 / 15;
        let flipHorizontal = true;
        
        // Canvas elements
        const webcam = document.getElementById('webcam');
        const bgCanvasElem = document.getElementById('backgroundCanvas');
        const resultCanvasElem = document.getElementById('resultCanvas');
        const resultContainer = document.getElementById('resultContainer');
        const webcamContainer = document.getElementById('webcamContainer');
        const bgContainer = document.getElementById('bgContainer');
        const landscapeBtn = document.getElementById('landscapeBtn');
        const portraitBtn = document.getElementById('portraitBtn');
        const darkBtn = document.getElementById('darkBtn');
        const lightBtn = document.getElementById('lightBtn');
        const orientationBadge = document.getElementById('orientationBadge');
        
        let bgCtx, resultCtx;
        
        // Target dimensions berdasarkan orientasi
        let targetWidth = 1280;
        let targetHeight = 720;
        
        // ==================== THEME BUTTON ====================
        function setTheme(theme) {
            currentTheme = theme;
            
            if (theme === 'dark') {
                document.body.classList.remove('light-mode');
                darkBtn.classList.add('active');
                lightBtn.classList.remove('active');
                updateStatus('dark mode');
            } else {
                document.body.classList.add('light-mode');
                lightBtn.classList.add('active');
                darkBtn.classList.remove('active');
                updateStatus('light mode');
            }
            localStorage.setItem('theme', theme);
        }
        
        // ==================== ORIENTATION BUTTON ====================
        function setOrientation(orientation) {
            currentOrientation = orientation;
            
            // Update button UI
            if (orientation === 'landscape') {
                landscapeBtn.classList.add('active');
                portraitBtn.classList.remove('active');
                targetWidth = 1280;
                targetHeight = 720;
                orientationBadge.textContent = '16:9';
                updateStatus('landscape mode (16:9)');
            } else {
                portraitBtn.classList.add('active');
                landscapeBtn.classList.remove('active');
                targetWidth = 720;
                targetHeight = 1280;
                orientationBadge.textContent = '9:16';
                updateStatus('portrait mode (9:16)');
            }
            
            // Update all containers
            const containers = [
                { element: resultContainer, mode: `${orientation}-mode` },
                { element: webcamContainer, mode: `${orientation}-mode` },
                { element: bgContainer, mode: `${orientation}-mode` }
            ];
            
            containers.forEach(container => {
                container.element.classList.remove('landscape-mode', 'portrait-mode');
                container.element.classList.add(container.mode);
            });
            
            // Resize canvases
            if (bgCtx && resultCtx) {
                bgCanvasElem.width = targetWidth;
                bgCanvasElem.height = targetHeight;
                resultCanvasElem.width = targetWidth;
                resultCanvasElem.height = targetHeight;
                
                // Redraw background
                if (bgImageObj) {
                    drawBackgroundWithTransform();
                } else {
                    drawDefaultBackground();
                }
            }
        }
        
        // ==================== DRAW FUNCTIONS ====================
        function drawDefaultBackground() {
            if (!bgCtx) return;
            const w = targetWidth;
            const h = targetHeight;
            
            const gradient = bgCtx.createLinearGradient(0, 0, w, h);
            gradient.addColorStop(0, '#2a2a2a');
            gradient.addColorStop(0.5, '#1a1a1a');
            gradient.addColorStop(1, '#0a0a0a');
            bgCtx.fillStyle = gradient;
            bgCtx.fillRect(0, 0, w, h);
            bgCtx.fillStyle = '#ffffff';
            bgCtx.font = `${Math.floor(Math.min(w, h) * 0.05)}px sans-serif`;
            bgCtx.textAlign = 'center';
            bgCtx.fillText('background', w/2, h/2);
            bgCtx.font = `${Math.floor(Math.min(w, h) * 0.03)}px sans-serif`;
            bgCtx.fillStyle = '#808080';
            bgCtx.fillText('upload image', w/2, h/2 + 40);
        }
        
        function drawBackgroundWithTransform() {
            if (!bgCtx) return;
            
            const w = targetWidth;
            const h = targetHeight;
            
            bgCtx.clearRect(0, 0, w, h);
            
            if (!bgImageObj) {
                drawDefaultBackground();
                return;
            }
            
            const zoomFactor = bgZoom / 100;
            let imgW = bgImageObj.width * zoomFactor;
            let imgH = bgImageObj.height * zoomFactor;
            
            const offsetX = (bgPosX / 100) * w;
            const offsetY = (bgPosY / 100) * h;
            
            let drawX = (w - imgW) / 2 + offsetX;
            let drawY = (h - imgH) / 2 + offsetY;
            
            bgCtx.save();
            if (bgRotate !== 0) {
                const centerX = drawX + imgW / 2;
                const centerY = drawY + imgH / 2;
                bgCtx.translate(centerX, centerY);
                bgCtx.rotate(bgRotate * Math.PI / 180);
                bgCtx.translate(-centerX, -centerY);
            }
            bgCtx.drawImage(bgImageObj, drawX, drawY, imgW, imgH);
            bgCtx.restore();
        }
        
        // ==================== RESET FUNCTIONS ====================
        function resetBasicDefaults() {
            document.getElementById('keyColor').value = '#00ff00';
            keyColor = [0, 255, 0];
            document.getElementById('tolerance').value = '0.35';
            tolerance = 0.35;
            document.getElementById('toleranceValue').textContent = '0.35';
            document.getElementById('smoothness').value = '0.15';
            smoothness = 0.15;
            document.getElementById('smoothValue').textContent = '0.15';
            updateStatus("basic settings reset");
        }
        
        function resetAdvancedDefaults() {
            document.getElementById('qualityMode').value = 'medium';
            document.getElementById('fpsLimit').value = '15';
            fpsInterval = 1000 / 15;
            const oldCameraMode = document.getElementById('cameraMode').value;
            document.getElementById('cameraMode').value = 'user';
            document.getElementById('flipMode').value = 'flip';
            flipHorizontal = true;
            updateStatus("advanced settings reset");
            if (oldCameraMode !== 'user') {
                if (webcam.srcObject) webcam.srcObject.getTracks().forEach(track => track.stop());
                isWebcamReady = false;
                initWebcam();
            }
        }
        
        function resetBackgroundTransform() {
            bgZoom = 100;
            bgPosX = 0;
            bgPosY = 0;
            bgRotate = 0;
            document.getElementById('bgZoom').value = 100;
            document.getElementById('bgPosX').value = 0;
            document.getElementById('bgPosY').value = 0;
            document.getElementById('bgRotate').value = 0;
            document.getElementById('zoomValue').textContent = '100%';
            document.getElementById('posXValue').textContent = '0';
            document.getElementById('posYValue').textContent = '0';
            document.getElementById('rotateValue').textContent = '0°';
            if (bgImageObj) {
                drawBackgroundWithTransform();
            } else {
                drawDefaultBackground();
            }
            updateStatus("background transform reset");
        }
        
        // ==================== WEBCAM INIT ====================
        async function initWebcam() {
            try {
                updateStatus("initializing camera...");
                const cameraMode = document.getElementById('cameraMode').value;
                const flipMode = document.getElementById('flipMode').value;
                flipHorizontal = flipMode === 'flip';
                
                const constraints = {
                    video: {
                        facingMode: cameraMode,
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                webcam.srcObject = stream;
                
                webcam.onloadedmetadata = () => {
                    webcam.play().then(() => {
                        videoWidth = webcam.videoWidth;
                        videoHeight = webcam.videoHeight;
                        
                        bgCtx = bgCanvasElem.getContext('2d');
                        resultCtx = resultCanvasElem.getContext('2d');
                        
                        setOrientation(currentOrientation);
                        
                        isWebcamReady = true;
                        document.getElementById('webcamInfo').textContent = `${videoWidth}×${videoHeight} | camera ready`;
                        updateStatus(`camera ready | ${videoWidth}x${videoHeight}`);
                    }).catch(e => updateStatus("error: " + e.message));
                };
            } catch (err) {
                updateStatus("camera access failed");
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    webcam.srcObject = stream;
                    updateStatus("compatibility mode");
                    isWebcamReady = true;
                } catch (e) {
                    updateStatus("cannot access camera");
                }
            }
        }
        
        function updateStatus(message) {
            const themeStatus = currentTheme === 'dark' ? 'dark' : 'light';
            const orientationStatus = currentOrientation === 'landscape' ? 'landscape' : 'portrait';
            document.getElementById('status').textContent = `● ${message} | ${themeStatus} | ${orientationStatus}`;
        }
        
        function switchTab(tabName, event) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            else {
                const btns = document.querySelectorAll('.tab-btn');
                if (tabName === 'basic') btns[0].classList.add('active');
                else if (tabName === 'advanced') btns[1].classList.add('active');
                else btns[2].classList.add('active');
            }
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }
        
        // ==================== EVENT LISTENERS ====================
        document.getElementById('keyColor').addEventListener('input', (e) => {
            const hex = e.target.value;
            keyColor = [parseInt(hex.substr(1,2), 16), parseInt(hex.substr(3,2), 16), parseInt(hex.substr(5,2), 16)];
        });
        document.getElementById('tolerance').addEventListener('input', (e) => {
            tolerance = parseFloat(e.target.value);
            document.getElementById('toleranceValue').textContent = tolerance.toFixed(2);
        });
        document.getElementById('smoothness').addEventListener('input', (e) => {
            smoothness = parseFloat(e.target.value);
            document.getElementById('smoothValue').textContent = smoothness.toFixed(2);
        });
        document.getElementById('fpsLimit').addEventListener('change', (e) => {
            fpsInterval = 1000 / parseInt(e.target.value);
        });
        document.getElementById('cameraMode').addEventListener('change', () => {
            if (webcam.srcObject) webcam.srcObject.getTracks().forEach(track => track.stop());
            isWebcamReady = false;
            initWebcam();
        });
        document.getElementById('flipMode').addEventListener('change', (e) => {
            flipHorizontal = e.target.value === 'flip';
        });
        
        document.getElementById('bgZoom').addEventListener('input', (e) => {
            bgZoom = parseInt(e.target.value);
            document.getElementById('zoomValue').textContent = bgZoom + '%';
            if (bgImageObj || true) drawBackgroundWithTransform();
        });
        document.getElementById('bgPosX').addEventListener('input', (e) => {
            bgPosX = parseInt(e.target.value);
            document.getElementById('posXValue').textContent = bgPosX;
            if (bgImageObj || true) drawBackgroundWithTransform();
        });
        document.getElementById('bgPosY').addEventListener('input', (e) => {
            bgPosY = parseInt(e.target.value);
            document.getElementById('posYValue').textContent = bgPosY;
            if (bgImageObj || true) drawBackgroundWithTransform();
        });
        document.getElementById('bgRotate').addEventListener('input', (e) => {
            bgRotate = parseInt(e.target.value);
            document.getElementById('rotateValue').textContent = bgRotate + '°';
            if (bgImageObj || true) drawBackgroundWithTransform();
        });
        
        document.getElementById('bgUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        bgImageObj = img;
                        drawBackgroundWithTransform();
                        updateStatus("background uploaded");
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        
        // ==================== GREEN SCREEN PROCESSING ====================
        function applyGreenScreen() {
            if (!isWebcamReady || !webcam.videoWidth) return false;
            
            try {
                const now = performance.now();
                if (now - lastProcessTime < fpsInterval) return true;
                lastProcessTime = now;
                
                const w = targetWidth;
                const h = targetHeight;
                
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = w;
                tempCanvas.height = h;
                const tempCtx = tempCanvas.getContext('2d');
                
                if (flipHorizontal) {
                    tempCtx.save();
                    tempCtx.scale(-1, 1);
                    tempCtx.drawImage(webcam, -w, 0, w, h);
                    tempCtx.restore();
                } else {
                    tempCtx.drawImage(webcam, 0, 0, w, h);
                }
                
                const webcamData = tempCtx.getImageData(0, 0, w, h);
                const bgData = bgCtx.getImageData(0, 0, w, h);
                const resultData = resultCtx.createImageData(w, h);
                
                const webcamPixels = webcamData.data;
                const bgPixels = bgData.data;
                const resultPixels = resultData.data;
                
                for (let i = 0; i < webcamPixels.length; i += 4) {
                    const r = webcamPixels[i];
                    const g = webcamPixels[i + 1];
                    const b = webcamPixels[i + 2];
                    const dr = r - keyColor[0];
                    const dg = g - keyColor[1];
                    const db = b - keyColor[2];
                    const distance = Math.sqrt(dr*dr + dg*dg + db*db) / Math.sqrt(255*255*3);
                    
                    let alpha;
                    if (distance <= tolerance) alpha = 0;
                    else if (distance >= tolerance + smoothness) alpha = 1;
                    else alpha = (distance - tolerance) / smoothness;
                    
                    if (alpha === 0) {
                        resultPixels[i] = bgPixels[i];
                        resultPixels[i + 1] = bgPixels[i + 1];
                        resultPixels[i + 2] = bgPixels[i + 2];
                    } else if (alpha === 1) {
                        resultPixels[i] = webcamPixels[i];
                        resultPixels[i + 1] = webcamPixels[i + 1];
                        resultPixels[i + 2] = webcamPixels[i + 2];
                    } else {
                        resultPixels[i] = webcamPixels[i] * alpha + bgPixels[i] * (1 - alpha);
                        resultPixels[i + 1] = webcamPixels[i + 1] * alpha + bgPixels[i + 1] * (1 - alpha);
                        resultPixels[i + 2] = webcamPixels[i + 2] * alpha + bgPixels[i + 2] * (1 - alpha);
                    }
                    resultPixels[i + 3] = 255;
                }
                
                resultCtx.putImageData(resultData, 0, 0);
                return true;
            } catch (error) {
                return false;
            }
        }
        
        function processFrame() {
            if (isWebcamReady) {
                applyGreenScreen();
            }
            animationFrame = requestAnimationFrame(processFrame);
        }
        
        // ==================== CAPTURE ====================
        window.captureResult = function() {
            try {
                const link = document.createElement('a');
                const orientationSuffix = currentOrientation === 'landscape' ? 'landscape' : 'portrait';
                link.download = `greenscreen-${orientationSuffix}-${Date.now()}.png`;
                resultCanvasElem.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                    updateStatus(`captured in ${currentOrientation} mode`);
                }, 'image/png', 0.95);
            } catch (error) {
                updateStatus("capture failed");
            }
        };
        
        // ==================== START ====================
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            setTheme('light');
        } else {
            setTheme('dark');
        }
        
        initWebcam();
        processFrame();
        
        window.addEventListener('beforeunload', () => {
            if (animationFrame) cancelAnimationFrame(animationFrame);
            if (webcam.srcObject) webcam.srcObject.getTracks().forEach(track => track.stop());
        });
    </script>
</body>
</html>
